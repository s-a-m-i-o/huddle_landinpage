<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/global.css">
  <link rel="stylesheet" href="./src/css/estilos.css">
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <header>
    <img src="./src/images/logo.svg" alt="Logo do site" class="logo">
  </header>
  <main>
    <section class="conteudo">
      <img src="./src/images/illustration-mockups.svg" alt="Ilustração">
      <h1 class="titulo">Build The Community Your Fans Will Love</h1>
      <p class="descricao">
        Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
        Create connections with your users as you engage in genuine discussion.
      </p>
      <a href="#" class="btn">Registr</a>
    </section>
  </main>

    <footer class="attribution">
      <div class="redes">
        <a href="#">
          <i class="bi bi-github"></i>
        </a>
        <a href="#">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="#">
          <i class="bi bi-instagram"></i>
        </a>
        
        
        
      </div>
      <div class="creditos">        
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/s-a-m-i-o/">Samio Azeredo</a>.
      </div>
    </footer>
</body>
</html>
